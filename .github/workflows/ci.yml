name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Solution build (added once src/ exists) ─────────────────────
  # build-solution:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: '10.0.x'
  #     - run: dotnet restore
  #     - run: dotnet build --no-restore -c Release
  #     - run: dotnet test  --no-build  -c Release

  # ─── Docs build (runs now) ───────────────────────────────────────
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build docs
        run: docfx docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ─── Deploy docs to GitHub Pages (main only) ─────────────────────
  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-docs]
    # When solution exists, add: needs: [build-solution, build-docs]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
